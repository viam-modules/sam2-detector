on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Validating tag: $TAG"
          if [[ $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]*)?$ ]]; then
            echo "Tag matches semver."
          else
            echo "Error: tag does not match semver"
            exit 1
          fi

  # Build and upload three platform variants (sequentially to avoid race conditions).
  publish:
    needs: validate-tag
    strategy:
      max-parallel: 1
      matrix:
        include:
          # macOS Apple Silicon — onefile, standard torch (MPS)
          - platform: darwin/arm64
            build_target: darwin
            tags: ""
          # Linux CPU — onefile, CPU-only torch
          - platform: linux/amd64
            build_target: linux-cpu
            tags: ""
          # Linux ROCm — onedir, ROCm torch for AMD GPUs
          - platform: linux/amd64
            build_target: linux-rocm
            tags: "rocm:true"
    name: "Build ${{ matrix.build_target }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Publish
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: viamrobotics/build-action@v1.6
        with:
          version: ${{ github.event.release.tag_name }}
          ref: ${{ github.sha }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_value }}
          token: ${{ github.token }}
          platform: ${{ matrix.platform }}
          tags: ${{ matrix.tags }}
        env:
          SAM2_BUILD_TARGET: ${{ matrix.build_target }}
